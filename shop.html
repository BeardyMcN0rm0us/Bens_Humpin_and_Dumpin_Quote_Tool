<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Humpin' & Dumpin' Shop</title>
<meta name="theme-color" content="#0a0a0a"/>
<link rel="icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap">
<style>
:root {
  --bg:      #0a0a0a;
  --surface: #141414;
  --surface2:#1c1c1c;
  --border:  #2a2a2a;
  --ink:     #ffffff;
  --ink2:    #a0a0a0;
  --brand:   #f4a261;
  --brand2:  #e76f51;
  --green:   #25D366;
  --r:       14px;
  --r-sm:    10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Nunito', system-ui, sans-serif;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

/* ── HEADER ── */
.app-header {
position: fixed;
top: 0; left: 0; right: 0;
z-index: 100;
background: var(–bg);
border-bottom: 1px solid var(–border);
padding: env(safe-area-inset-top, 0) 0 0;
}
.header-inner {
display: flex;
align-items: center;
gap: 12px;
padding: 12px 16px;
}
.header-inner img {
width: 38px; height: 38px;
border-radius: 10px;
border: 1px solid var(–border);
object-fit: cover;
flex-shrink: 0;
}
.header-title { flex: 1; }
.header-title h1 {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.4rem;
letter-spacing: 0.04em;
color: var(–brand);
line-height: 1;
}
.header-title .sub {
font-size: 0.7rem;
font-weight: 700;
color: var(–ink2);
text-transform: uppercase;
letter-spacing: 0.1em;
}
.header-link {
font-size: 0.72rem;
font-weight: 800;
color: var(–ink2);
text-decoration: none;
text-transform: uppercase;
letter-spacing: 0.07em;
border: 1px solid var(–border);
padding: 7px 12px;
border-radius: var(–r-sm);
flex-shrink: 0;
}

/* ── SCROLL BODY ── */
.scroll-body {
padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px));
min-height: 100vh;
}

/* ── PAGE HEAD ── */
.page-head {
padding: 20px 16px 4px;
}
.page-head h2 {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 2.2rem;
letter-spacing: 0.04em;
color: var(–ink);
line-height: 1;
}
.page-head p {
font-size: 0.85rem;
color: var(–ink2);
font-weight: 600;
margin-top: 4px;
line-height: 1.5;
}

/* ── FILTER BAR ── */
.filter-bar {
display: flex;
gap: 8px;
padding: 12px 16px 4px;
overflow-x: auto;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-btn {
flex-shrink: 0;
background: var(–surface);
border: 1.5px solid var(–border);
border-radius: 20px;
padding: 8px 16px;
font-family: ‘Nunito’, sans-serif;
font-weight: 800;
font-size: 0.78rem;
color: var(–ink2);
cursor: pointer;
text-transform: uppercase;
letter-spacing: 0.06em;
transition: all 0.15s;
-webkit-tap-highlight-color: transparent;
}
.filter-btn.is-active {
background: var(–brand);
border-color: var(–brand);
color: #1a0800;
}

/* ── ITEM COUNT ── */
.item-count {
padding: 8px 16px 0;
font-size: 0.75rem;
font-weight: 700;
color: var(–ink2);
text-transform: uppercase;
letter-spacing: 0.07em;
min-height: 24px;
}

/* ── SHOP GRID ── */
.shop-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
padding: 10px 16px 0;
}
@media (min-width: 600px) {
.shop-grid { grid-template-columns: repeat(3, 1fr); }
}

/* ── ITEM CARD ── */
.item-card {
background: var(–surface);
border: 1.5px solid var(–border);
border-radius: var(–r);
overflow: hidden;
display: flex;
flex-direction: column;
}
.item-img-wrap {
position: relative;
width: 100%;
padding-top: 100%;
background: #1a1a1a;
overflow: hidden;
}
.item-img-wrap img {
position: absolute;
inset: 0;
width: 100%; height: 100%;
object-fit: contain;
padding: 8px;
}
.item-img-placeholder {
position: absolute;
inset: 0;
display: flex;
align-items: center;
justify-content: center;
font-size: 2.5rem;
opacity: 0.3;
}
.condition-badge {
position: absolute;
top: 8px; left: 8px;
font-size: 0.6rem;
font-weight: 900;
text-transform: uppercase;
letter-spacing: 0.07em;
padding: 3px 7px;
border-radius: 4px;
line-height: 1.4;
z-index: 1;
}
.condition-badge.new     { background: #0d3320; color: #3dcc7a; border: 1px solid #1a4a28; }
.condition-badge.opened  { background: #1a1000; color: var(–brand); border: 1px solid #3a2500; }
.condition-badge.used    { background: #0d1433; color: #7ab3ff; border: 1px solid #1a2a50; }
.postage-badge {
position: absolute;
top: 8px; right: 8px;
font-size: 0.6rem;
font-weight: 900;
padding: 3px 7px;
border-radius: 4px;
line-height: 1.4;
background: var(–surface2);
border: 1px solid var(–border);
color: var(–ink2);
z-index: 1;
}
.item-body {
padding: 10px 10px 12px;
display: flex;
flex-direction: column;
flex: 1;
gap: 6px;
}
.item-title {
font-size: 0.78rem;
font-weight: 800;
color: var(–ink);
line-height: 1.3;
display: -webkit-box;
-webkit-line-clamp: 3;
-webkit-box-orient: vertical;
overflow: hidden;
}
.item-title.loading {
height: 48px;
background: linear-gradient(90deg, var(–surface2) 25%, #252525 50%, var(–surface2) 75%);
background-size: 200% 100%;
animation: shimmer 1.4s infinite;
border-radius: 4px;
}
@keyframes shimmer {
0%   { background-position: 200% 0; }
100% { background-position: -200% 0; }
}
.item-price {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.4rem;
color: var(–brand);
letter-spacing: 0.03em;
line-height: 1;
}
.btn-wa {
margin-top: auto;
width: 100%;
padding: 11px;
border: none;
border-radius: var(–r-sm);
background: linear-gradient(135deg, #29d980, var(–green));
color: #051209;
font-family: ‘Nunito’, sans-serif;
font-weight: 900;
font-size: 0.82rem;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
transition: filter 0.15s;
-webkit-tap-highlight-color: transparent;
}
.btn-wa:active { filter: brightness(0.9); }
.btn-amazon {
width: 100%;
padding: 8px;
border: 1.5px solid var(–border);
border-radius: var(–r-sm);
background: transparent;
color: var(–ink2);
font-family: ‘Nunito’, sans-serif;
font-weight: 700;
font-size: 0.72rem;
cursor: pointer;
text-align: center;
text-decoration: none;
display: block;
-webkit-tap-highlight-color: transparent;
}

/* ── EMPTY / ERROR STATES ── */
.empty-state {
grid-column: 1 / -1;
text-align: center;
padding: 48px 16px;
color: var(–ink2);
}
.empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
.empty-state h3 {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 1.4rem;
color: var(–ink);
margin-bottom: 6px;
}
.empty-state p { font-size: 0.85rem; font-weight: 600; line-height: 1.5; }
</style>

</head>
<body>

<div class="app-header" id="appHeader">
  <div class="header-inner">
    <img src="icon-192.png" alt="logo">
    <div class="header-title">
      <h1>Humpin' &amp; Dumpin'</h1>
      <div class="sub">The Shop</div>
    </div>
    <a class="header-link" href="index.html">← Quotes</a>
  </div>
</div>

<div class="scroll-body" id="scrollBody">
  <div class="page-head">
    <h2>Amazon Vine Finds</h2>
    <p>Tested by Ben — sold cheap.<br>Tap WhatsApp to enquire about any item.</p>
  </div>

  <div class="filter-bar" id="filterBar">
    <button class="filter-btn is-active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="new">New</button>
    <button class="filter-btn" data-filter="opened">Opened</button>
    <button class="filter-btn" data-filter="used">Used</button>
    <button class="filter-btn" data-filter="postage">Postage OK</button>
    <button class="filter-btn" data-filter="collection">Collect Only</button>
  </div>

  <div class="item-count" id="itemCount"></div>
  <div class="shop-grid" id="shopGrid"></div>
</div>

<script src="shop-items.js"></script>

<script>
(function(){
  var WHATSAPP = '447717463496';
  var activeFilter = 'all';

  // Pull ASIN from Amazon URL
  function asinFromUrl(url){
    var m = url.match(/\/dp\/([A-Z0-9]{10})/i) || url.match(/\/product\/([A-Z0-9]{10})/i) || url.match(/\?.*asin=([A-Z0-9]{10})/i);
    return m ? m[1] : null;
  }

  // Try multiple Amazon image CDN patterns
  function imgUrls(asin){
    if(!asin) return [];
    return [
      'https://m.media-amazon.com/images/P/' + asin + '.jpg',
      'https://images-eu.ssl-images-amazon.com/images/P/' + asin + '._SL500_.jpg',
      'https://ws-eu.amazon-adsystem.com/widgets/q?_encoding=UTF8&ASIN=' + asin + '&Format=_SL250_&ID=AsinImage&MarketPlace=GB&ServiceVersion=20070822&WS=1&tag=benhd-21'
    ];
  }

  function conditionLabel(c){
    return c === 'new' ? 'New' : c === 'opened' ? 'Opened' : 'Used';
  }

  function waMsg(item){
    var title = item._title || item.url;
    return encodeURIComponent(
      "Hey Ben! I'm interested in buying:\n\n" +
      title + "\n" +
      "Your price: £" + item.price + "\n" +
      (item.postage ? "Can you post it?\n" : "I'll collect.\n") +
      "\nAmazon link: " + item.url + "\n\nIs it still available?"
    );
  }

  function setOffset(){
    var h = document.getElementById('appHeader');
    var b = document.getElementById('scrollBody');
    if(h && b) b.style.paddingTop = (h.offsetHeight + 4) + 'px';
  }
  setOffset();
  window.addEventListener('resize', setOffset);

  function filteredItems(){
    return (window.SHOP_ITEMS || []).filter(function(it){
      if(it.sold) return false;
      if(activeFilter === 'all') return true;
      if(activeFilter === 'new') return it.condition === 'new';
      if(activeFilter === 'opened') return it.condition === 'opened';
      if(activeFilter === 'used') return it.condition === 'used';
      if(activeFilter === 'postage') return it.postage === true;
      if(activeFilter === 'collection') return it.postage === false;
      return true;
    });
  }

  function renderGrid(){
    var grid = document.getElementById('shopGrid');
    var countEl = document.getElementById('itemCount');
    var items = filteredItems();

    if(items.length === 0){
      countEl.textContent = '';
      grid.innerHTML = '<div class="empty-state"><div class="emoji">📦</div><h3>Nothing here</h3><p>No items match that filter right now.<br>Check back soon!</p></div>';
      return;
    }

    countEl.textContent = items.length + ' item' + (items.length !== 1 ? 's' : '') + ' available';

    // Build cards with loading state, then load images
    grid.innerHTML = items.map(function(item, idx){
      var asin = asinFromUrl(item.url);
      var imgSrc = asin ? imgUrls(asin)[0] : '';
      return '<div class="item-card" id="card-' + idx + '">' +
        '<div class="item-img-wrap">' +
          '<span class="condition-badge ' + item.condition + '">' + conditionLabel(item.condition) + '</span>' +
          '<span class="postage-badge">' + (item.postage ? '📮 Post' : '🚗 Collect') + '</span>' +
          (imgSrc
            ? '<img src="' + imgSrc + '" alt="Product image" id="img-' + idx + '" style="opacity:0;transition:opacity 0.3s">'
            : '<div class="item-img-placeholder">📦</div>') +
        '</div>' +
        '<div class="item-body">' +
          '<div class="item-title loading" id="title-' + idx + '"></div>' +
          '<div class="item-price">£' + item.price + '</div>' +
          '<button class="btn-wa" id="wa-' + idx + '">💬 WhatsApp Ben</button>' +
          '<a class="btn-amazon" href="' + item.url + '" target="_blank" rel="noopener">View on Amazon ↗</a>' +
        '</div>' +
      '</div>';
    }).join('');

    // Wire up WhatsApp buttons and load titles
    items.forEach(function(item, idx){
      var waBtn = document.getElementById('wa-' + idx);
      if(waBtn){
        waBtn.addEventListener('click', function(){
          window.open('https://wa.me/' + WHATSAPP + '?text=' + waMsg(item), '_blank');
        });
      }

      // Try to load image with fallback
      var asin = asinFromUrl(item.url);
      if(asin){
        var imgEl = document.getElementById('img-' + idx);
        if(imgEl){
          var urls = imgUrls(asin);
          var tryIdx = 0;
          function tryNext(){
            if(tryIdx >= urls.length){
              imgEl.style.display = 'none';
              var wrap = imgEl.parentNode;
              var ph = document.createElement('div');
              ph.className = 'item-img-placeholder';
              ph.textContent = '📦';
              wrap.appendChild(ph);
              return;
            }
            imgEl.onload = function(){ imgEl.style.opacity = '1'; };
            imgEl.onerror = function(){ tryIdx++; tryNext(); };
            imgEl.src = urls[tryIdx];
          }
          tryNext();
        }

        // Fetch title via allorigins CORS proxy
        var titleEl = document.getElementById('title-' + idx);
        fetch('https://api.allorigins.win/get?url=' + encodeURIComponent('https://www.amazon.co.uk/dp/' + asin))
          .then(function(r){ return r.json(); })
          .then(function(data){
            var m = data.contents && data.contents.match(/<title[^>]*>([^<]+)<\/title>/i);
            if(m){
              var raw = m[1].replace(/\s*:.*Amazon.*$/i,'').replace(/Amazon\.co\.uk/gi,'').replace(/\s*[-|:]\s*$/, '').trim();
              // Truncate to first ~80 chars at a word boundary
              if(raw.length > 80) raw = raw.substring(0, raw.lastIndexOf(' ', 80)) + '…';
              if(titleEl){ titleEl.textContent = raw; titleEl.classList.remove('loading'); }
              item._title = raw;
            } else {
              if(titleEl){ titleEl.textContent = 'Amazon Product'; titleEl.classList.remove('loading'); }
            }
          })
          .catch(function(){
            if(titleEl){ titleEl.textContent = 'Amazon Product'; titleEl.classList.remove('loading'); }
          });
      } else {
        var titleEl2 = document.getElementById('title-' + idx);
        if(titleEl2){ titleEl2.textContent = 'Amazon Product'; titleEl2.classList.remove('loading'); }
      }
    });
  }

  // Filter buttons
  document.getElementById('filterBar').querySelectorAll('.filter-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('is-active'); });
      btn.classList.add('is-active');
      activeFilter = btn.dataset.filter;
      renderGrid();
    });
  });

  renderGrid();
})();
</script>

</body>
</html>
