<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Humpin' & Dumpin' Shop</title>
<meta name="theme-color" content="#0a0a0a"/>
<link rel="icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap">
<style>
:root {
  --bg:      #0a0a0a;
  --surface: #141414;
  --surface2:#1c1c1c;
  --border:  #2a2a2a;
  --ink:     #ffffff;
  --ink2:    #a0a0a0;
  --brand:   #f4a261;
  --brand2:  #e76f51;
  --green:   #25D366;
  --r:       14px;
  --r-sm:    10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Nunito', system-ui, sans-serif;
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}
.app-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: env(safe-area-inset-top, 0) 0 0;
}
.header-inner {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
}
.header-inner img {
  width: 38px; height: 38px;
  border-radius: 10px;
  border: 1px solid var(--border);
  object-fit: cover;
  flex-shrink: 0;
}
.header-title { flex: 1; }
.header-title h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 0.04em;
  color: var(--brand);
  line-height: 1;
}
.header-title .sub {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--ink2);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.header-link {
  font-size: 0.72rem;
  font-weight: 800;
  color: var(--ink2);
  text-decoration: none;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  border: 1px solid var(--border);
  padding: 7px 12px;
  border-radius: var(--r-sm);
  flex-shrink: 0;
}
.scroll-body {
  padding-bottom: calc(40px + env(safe-area-inset-bottom, 0px));
  min-height: 100vh;
}
.page-head { padding: 20px 16px 4px; }
.page-head h2 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2.2rem;
  letter-spacing: 0.04em;
  color: var(--ink);
  line-height: 1;
}
.page-head p {
  font-size: 0.85rem;
  color: var(--ink2);
  font-weight: 600;
  margin-top: 4px;
  line-height: 1.5;
}
.filter-bar {
  display: flex;
  gap: 8px;
  padding: 12px 16px 4px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-btn {
  flex-shrink: 0;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 8px 16px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.78rem;
  color: var(--ink2);
  cursor: pointer;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.filter-btn.is-active {
  background: var(--brand);
  border-color: var(--brand);
  color: #1a0800;
}
.item-count {
  padding: 8px 16px 0;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--ink2);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  min-height: 24px;
}
.shop-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
  padding: 10px 16px 0;
}
.item-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
}
.item-main {
  display: flex;
  gap: 12px;
  padding: 12px;
}
.item-img-wrap {
  position: relative;
  width: 100px;
  height: 100px;
  flex-shrink: 0;
  background: #1a1a1a;
  border-radius: var(--r-sm);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.item-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 6px;
}
.shimmer {
  background: linear-gradient(90deg, var(--surface2) 25%, #252525 50%, var(--surface2) 75%);
  background-size: 200% 100%;
  animation: sh 1.4s infinite;
}
@keyframes sh {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.img-shimmer { width: 100%; height: 100%; }
.img-placeholder { font-size: 2.5rem; opacity: 0.2; }
.condition-badge {
  position: absolute;
  bottom: 4px; left: 4px;
  font-size: 0.55rem;
  font-weight: 900;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  padding: 2px 5px;
  border-radius: 3px;
  line-height: 1.4;
}
.condition-badge.new    { background: #0d3320; color: #3dcc7a; border: 1px solid #1a4a28; }
.condition-badge.opened { background: #1a1000; color: var(--brand); border: 1px solid #3a2500; }
.condition-badge.used   { background: #0d1433; color: #7ab3ff; border: 1px solid #1a2a50; }
.item-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
}
.item-title {
  font-size: 0.88rem;
  font-weight: 800;
  color: var(--ink);
  line-height: 1.3;
}
.title-shimmer { height: 42px; border-radius: 4px; width: 90%; }
.item-price-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-top: 2px;
  flex-wrap: wrap;
}
.item-price {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  color: var(--brand);
  letter-spacing: 0.03em;
  line-height: 1;
}
.item-rrp {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--ink2);
  text-decoration: line-through;
}
.item-saving {
  font-size: 0.7rem;
  font-weight: 900;
  color: #3dcc7a;
}
.item-amazon {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--ink2);
  text-decoration: none;
  margin-top: 2px;
}
.item-delivery {
  border-top: 1px solid var(--border);
  padding: 12px;
}
.delivery-toggle {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
}
.dtoggle-btn {
  flex: 1;
  padding: 10px 8px;
  border: 1.5px solid var(--border);
  border-radius: var(--r-sm);
  background: var(--surface2);
  color: var(--ink2);
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 0.82rem;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.dtoggle-btn.is-active {
  background: var(--brand);
  border-color: var(--brand);
  color: #1a0800;
}
.delivery-fields {
  display: none;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 10px;
}
.delivery-fields.open { display: flex; }
.delivery-fields input {
  width: 100%;
  padding: 12px 14px;
  border-radius: var(--r-sm);
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--ink);
  font-family: 'Nunito', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  outline: none;
  -webkit-appearance: none;
}
.delivery-fields input:focus { border-color: var(--brand); }
.delivery-hint {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--ink2);
  line-height: 1.5;
  min-height: 20px;
}
.delivery-hint.ok  { color: #3dcc7a; }
.delivery-hint.err { color: var(--brand2); }
.btn-wa {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: var(--r-sm);
  background: linear-gradient(135deg, #29d980, var(--green));
  color: #051209;
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  font-size: 0.9rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  -webkit-tap-highlight-color: transparent;
}
.btn-wa:active { filter: brightness(0.9); }
.empty-state {
  text-align: center;
  padding: 48px 16px;
}
.empty-state .emoji { font-size: 3rem; margin-bottom: 12px; }
.empty-state h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  color: var(--ink);
  margin-bottom: 6px;
}
.empty-state p {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--ink2);
  line-height: 1.5;
}
</style>
</head>
<body>

<div class="app-header" id="appHeader">
  <div class="header-inner">
    <img src="icon-192.png" alt="logo">
    <div class="header-title">
      <h1>Humpin' &amp; Dumpin'</h1>
      <div class="sub">The Shop</div>
    </div>
    <a class="header-link" href="index.html">&#8592; Quotes</a>
  </div>
</div>

<div class="scroll-body" id="scrollBody">
  <div class="page-head">
    <h2>Amazon Vine Finds</h2>
    <p>Tested by Ben &mdash; sold cheap.<br>
    Collection from Doddington or delivery at &pound;0.50/mile.</p>
  </div>
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn is-active" data-f="all">All</button>
    <button class="filter-btn" data-f="new">New</button>
    <button class="filter-btn" data-f="opened">Opened</button>
    <button class="filter-btn" data-f="used">Used</button>
  </div>
  <div class="item-count" id="itemCount"></div>
  <div class="shop-list"  id="shopList"></div>
</div>

<script src="shop-items.js"></script>

<script>
// Wrapped in try/catch at the top level so any error shows a message
// rather than a blank page
try {

var WHATSAPP = '447717463496';
var HOME_PC  = 'PE150SU';
var RATE     = 0.50;
var activeFilter = 'all';
var metaCache = {};

// ── Offset header ──────────────────────────────────────────────────
function setOffset() {
  try {
    var h = document.getElementById('appHeader');
    var b = document.getElementById('scrollBody');
    if (h && b) b.style.paddingTop = (h.offsetHeight + 4) + 'px';
  } catch(e) {}
}
setOffset();
window.addEventListener('resize', function() { try { setOffset(); } catch(e) {} });

// ── Filter buttons ─────────────────────────────────────────────────
document.getElementById('filterBar').querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    try {
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('is-active'); });
      btn.classList.add('is-active');
      activeFilter = btn.getAttribute('data-f');
      render();
    } catch(e) {}
  });
});

// ── Microlink fetch (image + title) ───────────────────────────────
function fetchMeta(url, cb) {
  try {
    if (metaCache[url] !== undefined) { cb(metaCache[url]); return; }
    // Set to null immediately so parallel calls don't double-fetch
    metaCache[url] = null;
    fetch('https://api.microlink.io/?url=' + encodeURIComponent(url) +
          '&palette=false&audio=false&video=false&iframe=false')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        try {
          var result = { title: null, img: null };
          if (d && d.status === 'success' && d.data) {
            result.title = d.data.title || null;
            if (d.data.image && d.data.image.url) result.img = d.data.image.url;
            // Try to get price from microlink
            if (d.data.price) result.price = d.data.price;
            else if (d.data.offers && d.data.offers.price) result.price = d.data.offers.price;
          }
          metaCache[url] = result;
          cb(result);
        } catch(e) { cb({ title: null, img: null }); }
      })
      .catch(function() { metaCache[url] = { title: null, img: null }; cb(metaCache[url]); });
  } catch(e) { cb({ title: null, img: null }); }
}

// ── Delivery cost (postcodes.io) ───────────────────────────────────
function calcDelivery(postcode, hintEl, cb) {
  try {
    hintEl.textContent = 'Calculating...';
    hintEl.className = 'delivery-hint';
    var pc = postcode.replace(/\s/g, '').toUpperCase();
    Promise.all([
      fetch('https://api.postcodes.io/postcodes/' + encodeURIComponent(pc)).then(function(r) { return r.json(); }),
      fetch('https://api.postcodes.io/postcodes/' + HOME_PC).then(function(r) { return r.json(); })
    ]).then(function(res) {
      try {
        if (res[0].status !== 200 || res[1].status !== 200) {
          hintEl.textContent = 'Could not find that postcode \u2014 please check it.';
          hintEl.className = 'delivery-hint err';
          cb(null); return;
        }
        var lat1 = res[1].result.latitude,  lon1 = res[1].result.longitude;
        var lat2 = res[0].result.latitude,  lon2 = res[0].result.longitude;
        var R = 3958.8, p = Math.PI / 180;
        var a = 0.5 - Math.cos((lat2 - lat1) * p) / 2 +
                Math.cos(lat1 * p) * Math.cos(lat2 * p) *
                (1 - Math.cos((lon2 - lon1) * p)) / 2;
        var miles = 2 * R * Math.asin(Math.sqrt(a)) * 1.2;
        var cost  = Math.max(5, Math.round(miles * RATE / 5) * 5);
        hintEl.textContent = 'Delivery: ~' + miles.toFixed(1) + ' miles = \u00a3' + cost + ' (\u00a30.50/mile)';
        hintEl.className = 'delivery-hint ok';
        cb(cost, miles.toFixed(1));
      } catch(e) {
        hintEl.textContent = 'Calculation error \u2014 please try again.';
        hintEl.className = 'delivery-hint err';
        cb(null);
      }
    }).catch(function() {
      hintEl.textContent = 'Could not calculate \u2014 check the postcode.';
      hintEl.className = 'delivery-hint err';
      cb(null);
    });
  } catch(e) {
    hintEl.textContent = 'Calculation error.';
    hintEl.className = 'delivery-hint err';
    cb(null);
  }
}

// ── Helpers ────────────────────────────────────────────────────────
function condLabel(c) {
  return c === 'new' ? 'New' : c === 'opened' ? 'Opened' : 'Used';
}
function savingPct(price, rrp) {
  if (!rrp || rrp <= price) return 0;
  return Math.round((1 - price / rrp) * 100);
}
function el(id) { return document.getElementById(id); }

// ── Render ─────────────────────────────────────────────────────────
function render() {
  try {
    var list    = el('shopList');
    var countEl = el('itemCount');
    var items   = (window.SHOP_ITEMS || []).filter(function(it) {
      if (it.sold) return false;
      if (activeFilter === 'all') return true;
      return it.condition === activeFilter;
    });

    if (!items.length) {
      countEl.textContent = '';
      list.innerHTML =
        '<div class="empty-state">' +
          '<div class="emoji">\ud83d\udce6</div>' +
          '<h3>Nothing here</h3>' +
          '<p>No items available right now.<br>Check back soon!</p>' +
        '</div>';
      return;
    }

    countEl.textContent = items.length + ' item' + (items.length !== 1 ? 's' : '') + ' available';

    // Build all card HTML in one go
    list.innerHTML = items.map(function(item, i) {
      try {
        var cond    = item.condition || 'used';
        var cached  = metaCache[item.url];
        var imgSrc  = item.img   || (cached && cached.img)   || null;
        var titleTx = item.title || (cached && cached.title) || null;
        var rrpVal  = (cached && cached.price) ? cached.price : (item.rrp ? item.rrp : null);
        var pct     = savingPct(item.price, rrpVal);

        return '<div class="item-card" id="card' + i + '">' +
          '<div class="item-main">' +

          // image
          '<div class="item-img-wrap" id="iw' + i + '">' +
            (imgSrc
              ? '<img src="' + imgSrc + '" alt="" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'\'">' +
                '<div class="img-placeholder" style="display:none">\ud83d\udce6</div>'
              : '<div class="shimmer img-shimmer" id="ish' + i + '"></div>' +
                '<div class="img-placeholder" id="iph' + i + '" style="display:none">\ud83d\udce6</div>') +
            '<span class="condition-badge ' + cond + '">' + condLabel(cond) + '</span>' +
          '</div>' +

          // info
          '<div class="item-info">' +
            (titleTx
              ? '<div class="item-title">' + titleTx + '</div>'
              : '<div class="shimmer title-shimmer" id="tsh' + i + '"></div>' +
                '<div class="item-title" id="ttl' + i + '" style="display:none"></div>') +
            '<div class="item-price-row" id="pr' + i + '">' +
              '<span class="item-price">\u00a3' + item.price + '</span>' +
              (rrpVal ? '<span class="item-rrp">\u00a3' + rrpVal + '</span>' : '') +
              (pct > 0  ? '<span class="item-saving">' + pct + '% off</span>' : '') +
            '</div>' +
            '<a class="item-amazon" href="' + item.url + '" target="_blank" rel="noopener">View on Amazon \u2197</a>' +
          '</div></div>' +

          // delivery
          '<div class="item-delivery">' +
            '<div class="delivery-toggle">' +
              '<button class="dtoggle-btn is-active" data-i="' + i + '" data-m="collect">\ud83d\ude97 Collection</button>' +
              '<button class="dtoggle-btn"            data-i="' + i + '" data-m="delivery">\ud83d\ude9a Delivery</button>' +
            '</div>' +
            '<div class="delivery-fields" id="df' + i + '">' +
              '<input type="text" id="dpc' + i + '" placeholder="Your postcode...">' +
              '<div class="delivery-hint" id="dh' + i + '">Enter your postcode to see the delivery cost.</div>' +
            '</div>' +
            '<button class="btn-wa" id="wa' + i + '">\ud83d\udcac WhatsApp Ben</button>' +
          '</div></div>';
      } catch(e) {
        // If one card fails to render, show a placeholder instead of dying
        return '<div class="item-card" style="padding:16px;color:var(--ink2);font-size:0.8rem">Item ' + (i+1) + ' could not be displayed.</div>';
      }
    }).join('');

    // Wire up each card independently — one card failing won't affect others
    items.forEach(function(item, i) {
      try {
        var mode   = 'collect';
        var dcost  = null;
        var dmiles = null;

        // Auto-fetch image + title if missing
        if (!item.img || !item.title) {
          fetchMeta(item.url, function(meta) {
            try {
              // Price — always use microlink's if it got one
              if (meta && meta.price) {
                var priceRow = el('pr' + i);
                if (priceRow) {
                  var pct2 = savingPct(item.price, meta.price);
                  priceRow.innerHTML =
                    '<span class="item-price">\u00a3' + item.price + '</span>' +
                    '<span class="item-rrp">\u00a3' + meta.price + '</span>' +
                    (pct2 > 0 ? '<span class="item-saving">' + pct2 + '% off</span>' : '');
                }
              }
              // Image
              if (!item.img && el('ish' + i)) {
                el('ish' + i).remove();
                if (meta && meta.img) {
                  var img = document.createElement('img');
                  img.src = meta.img;
                  img.onerror = function() {
                    img.remove();
                    var ph = el('iph' + i);
                    if (ph) ph.style.display = '';
                  };
                  var wrap = el('iw' + i);
                  if (wrap) wrap.insertBefore(img, wrap.firstChild);
                } else {
                  var ph = el('iph' + i);
                  if (ph) ph.style.display = '';
                }
              }
              // Title
              if (!item.title && el('tsh' + i)) {
                el('tsh' + i).remove();
                var ttl = el('ttl' + i);
                if (ttl) {
                  ttl.textContent = (meta && meta.title) ? meta.title : 'Amazon Product';
                  ttl.style.display = '';
                  item._title = ttl.textContent;
                }
              }
            } catch(e) {}
          });
        }

        // Delivery toggle
        var toggleBtns = document.querySelectorAll('.dtoggle-btn[data-i="' + i + '"]');
        var dfields = el('df' + i);
        var dpc = el('dpc' + i);
        var dh  = el('dh' + i);

        toggleBtns.forEach(function(btn) {
          btn.addEventListener('click', function() {
            try {
              toggleBtns.forEach(function(b) { b.classList.remove('is-active'); });
              btn.classList.add('is-active');
              mode = btn.getAttribute('data-m');
              if (mode === 'delivery') {
                dfields.classList.add('open');
                dpc.focus();
              } else {
                dfields.classList.remove('open');
                dcost = null; dmiles = null;
              }
            } catch(e) {}
          });
        });

        // Postcode input with debounce
        var timer = null;
        dpc.addEventListener('input', function() {
          try {
            clearTimeout(timer);
            dcost = null;
            if (dpc.value.length < 3) return;
            timer = setTimeout(function() {
              calcDelivery(dpc.value, dh, function(cost, miles) {
                dcost = cost; dmiles = miles;
              });
            }, 800);
          } catch(e) {}
        });

        // WhatsApp button
        el('wa' + i).addEventListener('click', function() {
          try {
            if (mode === 'delivery' && dpc.value.length < 3) {
              dh.textContent = 'Please enter your postcode first.';
              dh.className = 'delivery-hint err';
              dpc.focus(); return;
            }
            var title = item.title || item._title || 'your item';
            var msg = "Hey Ben! I'm interested in buying:\n\n" +
              title + "\n" +
              "Asking price: \u00a3" + item.price + "\n";
            if (mode === 'delivery') {
              msg += "I'd like delivery to: " + dpc.value + "\n";
              if (dcost) msg += "Delivery quote: \u00a3" + dcost + " (" + dmiles + " miles @ \u00a30.50/mile)\n";
            } else {
              msg += "I'll collect from Doddington.\n";
            }
            msg += "\nAmazon link: " + item.url + "\n\nIs it still available?";
            window.open('https://wa.me/' + WHATSAPP + '?text=' + encodeURIComponent(msg), '_blank');
          } catch(e) {}
        });

      } catch(e) {} // one card's wiring failing won't affect others
    });

  } catch(e) {
    // Render itself failed — show a friendly message
    var list = document.getElementById('shopList');
    if (list) list.innerHTML =
      '<div class="empty-state">' +
        '<div class="emoji">\ud83d\udee0\ufe0f</div>' +
        '<h3>Something went wrong</h3>' +
        '<p>Couldn\'t load the shop right now.<br>Try refreshing the page.</p>' +
      '</div>';
  }
}

// ── Boot ───────────────────────────────────────────────────────────
render();

} catch(e) {
  // Absolute last resort — the whole script block failed
  document.getElementById('shopList').innerHTML =
    '<div class="empty-state">' +
      '<div class="emoji">\ud83d\udee0\ufe0f</div>' +
      '<h3>Something went wrong</h3>' +
      '<p>Couldn\'t load the shop.<br>Try refreshing the page.</p>' +
    '</div>';
}
</script>

</body>
</html>
